<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Booking! - Hospital Appointment System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            color: #fff;
            position: relative; /* Needed for absolute positioning of background image */
        }

        .background-image-wrapper {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
        }

        .background-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(1.2) blur(2px);
        }

        .overlay {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 10, 20, 0.6);
            z-index: -1;
        }

        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .header-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
            transition: all 0.3s ease;
        }

        .header-link:hover {
            color: #00e6e6;
            text-shadow: 0 0 12px #00e6e6;
            transform: scale(1.05);
        }

        .header-link svg {
            width: 1.4em;
            height: 1.4em;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            padding: 100px 20px 50px;
            position: relative; /* To keep content above background */
            z-index: 1;
        }

        .main-title {
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #00e6e6, 0 0 30px #00e6e6, 0 0 40px #00e6e6;
            text-align: center;
        }

        .booking-form-container {
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #eee;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00e6e6;
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            padding-top: 5px;
        }

        .radio-group label {
            font-weight: 400;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(to right, #00b3b3, #00e6e6);
            color: #000;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .submit-btn:hover {
            box-shadow: 0 0 20px #00e6e6;
            transform: translateY(-3px);
        }

    </style>
</head>
<body>

    <div class="background-image-wrapper">
        <img src="images/ppp.jpg" alt="Hospital Background">
    </div>
    <div class="overlay"></div>

    <header class="top-header">
        <a href="connected pages(index).html" class="header-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </a>
        <a href="#" id="another-booking-btn" class="header-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Another Booking</span>
        </a>
        <a href="#" class="header-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.02.74-.25 1.02l-2.2 2.2z"/></svg>
            <span>Contact</span>
        </a>
        <a href="#" class="header-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.29-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.93-3.5 3.22-6 3.22z"/></svg>
            <span>About Us</span>
        </a>
    </header>

    <div class="main-container">
        <h1 class="main-title">Pre-Booking!</h1>

        <div class="booking-form-container">
            <form id="booking-form">
                <div class="form-group">
                    <label for="name">Patient Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" required min="0">
                </div>
                <div class="form-group">
                    <label for="phone">Contact Number</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label for="male"><input type="radio" id="male" name="gender" value="male" checked> Male</label>
                        <label for="female"><input type="radio" id="female" name="gender" value="female"> Female</label>
                        <label for="other"><input type="radio" id="other" name="gender" value="other"> Other</label>
                    </div>
                </div>
                 <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" rows="2" required></textarea>
                </div>
                <div class="form-group">
                    <label for="date">Booking Date</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="problem">Problem/Reason for Visit</label>
                    <textarea id="problem" name="problem" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Have you visited us before?</label>
                    <div class="radio-group">
                        <label for="visited-yes"><input type="radio" id="visited-yes" name="visited" value="yes"> Yes</label>
                        <label for="visited-no"><input type="radio" id="visited-no" name="visited" value="no" checked> No</label>
                    </div>
                </div>
                <button type="submit" class="submit-btn">Submit Request</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bookingRequests = JSON.parse(localStorage.getItem('bookingRequests')) || [];
            bookingRequests.sort((a, b) => b.id - a.id); // Sort to get latest first

            const latestActiveRequest = bookingRequests.find(request => request.status === 'pending' || request.status === 'accepted');

            if (latestActiveRequest) {
                if (latestActiveRequest.status === 'pending') {
                    window.location.href = 'submission_status.html';
                    return;
                } else if (latestActiveRequest.status === 'accepted') {
                    window.location.href = 'approval_confirmation.html';
                    return;
                }
            }

            document.getElementById('booking-form').addEventListener('submit', function(event) {
                event.preventDefault();

                const form = event.target;
                const bookingRequest = {
                    id: Date.now(), // Unique ID for the booking request
                    name: form.name.value,
                    age: form.age.value,
                    phone: form.phone.value,
                    gender: form.gender.value,
                    address: form.address.value,
                    date: form.date.value,
                    problem: form.problem.value,
                    visited: form.visited.value,
                    status: 'pending' // New status for booking requests
                };

                let bookingRequests = JSON.parse(localStorage.getItem('bookingRequests')) || [];
                bookingRequests.push(bookingRequest); // Add new request without filtering old accepted ones
                localStorage.setItem('bookingRequests', JSON.stringify(bookingRequests));
                console.log('Booking request saved to localStorage:', bookingRequest); // Debug log
                console.log('Current bookingRequests in localStorage:', JSON.parse(localStorage.getItem('bookingRequests'))); // Debug log

                // No alert, just redirect
                window.location.href = 'submission_status.html';
            });
            // Event listener for the "Another Booking" button in the header
            document.getElementById('another-booking-btn').addEventListener('click', function(event) {
                event.preventDefault();
                localStorage.removeItem('bookingRequests'); // Clear all booking requests
                window.location.href = 'patient_booking.html'; // Redirect to booking page
            });
        });
    </script>

</body>
</html>
