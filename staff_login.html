<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Hospital Queue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            padding: 140px 20px 50px; 
            align-items: center;
            color: #fff;
        }

        .bg-image {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/staffs 4.jpeg');
            background-size: cover;
            background-position: top;
            filter: blur(5px);
            z-index: -2;
        }

        .overlay {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 10, 20, 0.5);
            z-index: -1;
        }

        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .dashboard-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
            transition: all 0.3s ease;
        }

        .dashboard-link:hover {
            color: #00e6e6;
            text-shadow: 0 0 12px #00e6e6;
            transform: scale(1.05);
        }

        .dashboard-link svg {
            width: 1.4em;
            height: 1.4em;
        }

        .main-title {
            font-size: 3em;
            font-weight: 600;
            margin-bottom: 80px; 
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #00e6e6, 0 0 30px #00e6e6, 0 0 40px #00e6e6;
            text-align: center;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px; 
            width: 100%;
            max-width: 1300px; 
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-link:hover .glass-card {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .glass-card {
            width: 350px; 
            height: 350px; 
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: inherit; 
        }
        
        .card-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 25px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 2em; 
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        @media (max-width: 1250px) {
            .card-container {
                flex-direction: column;
                align-items: center;
                gap: 40px;
            }
            .glass-card {
                width: 400px;
                height: 400px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 2.2em;
            }
            .glass-card {
                width: 90vw; 
                height: 90vw; 
                padding: 30px;
            }
            .card-image {
                width: 120px;
                height: 120px;
                margin-bottom: 20px;
            }
            .card-title {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <a href="#" class="dashboard-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            <span>Dashboard</span>
        </a>
        <a href="index.html" class="dashboard-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </a>
        <a href="#" class="dashboard-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.02.74-.25 1.02l-2.2 2.2z"/></svg>
            <span>Contact</span>
        </a>
    </header>

    <div class="bg-image"></div>
    <div class="overlay"></div>

    <h1 class="main-title">Welcome Staff!</h1>

    <div class="card-container">
        
        <a href="receptionist_login.html" class="card-link">
            <div class="glass-card">
                <img src="images/receptionist.webp" alt="Receptionist" class="card-image">
                <h2 class="card-title">Receptionist Login</h2>
            </div>
        </a>

        <a href="doctor_login.html" class="card-link">
            <div class="glass-card">
                <img src="images/doctor image.webp" alt="Doctor" class="card-image">
                <h2 class="card-title">Doctor Login</h2>
            </div>
        </a>

        <a href="admin_login.html" class="card-link">
            <div class="glass-card">
                <img src="images/admin.webp" alt="Admin" class="card-image">
                <h2 class="card-title">Admin Login</h2>
            </div>
        </a>

    </div>

</body>
</html>
