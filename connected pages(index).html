<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Appointment</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* From homepage */
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            padding: 140px 20px 50px; /* From staff_login.html */
            align-items: center;
            color: #fff;
        }

        .bg-image {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/hi1.jpg'); /* From homepage */
            background-size: cover;
            background-position: center;
            filter: blur(3px) brightness(1.2); /* From homepage */
            z-index: -2;
        }

        .overlay {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 20, 40, 0.5); /* From homepage */
            z-index: -1;
        }

        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.2); /* From staff_login.html */
            backdrop-filter: blur(10px); /* From staff_login.html */
        }

        .nav-link { /* Renamed from dashboard-link for consistency with original homepage structure */
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #00e6e6;
            text-shadow: 0 0 12px #00e6e6;
            transform: scale(1.05);
        }

        .nav-link svg {
            width: 1.4em;
            height: 1.4em;
        }
        
        /* No ::after for nav-link as per staff_login.html style */

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            /* padding-top removed as body padding handles it */
        }

        .main-title {
            font-size: 3em;
            font-weight: 600;
            margin-bottom: 100px; /* Adjusted for attractive spacing */
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #00e6e6, 0 0 30px #00e6e6, 0 0 40px #00e6e6;
            text-align: center;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px; 
            width: 100%;
            max-width: 1300px; 
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-link:hover .glass-card {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .glass-card {
            width: 250px; /* Adjusted for smaller size */
            height: 250px; /* Adjusted for smaller size */
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: inherit; 
        }
        
        .card-image {
            width: 120px; /* Adjusted for smaller size */
            height: 120px; /* Adjusted for smaller size */
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.8em; /* Adjusted for smaller size */
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        @media (max-width: 1250px) {
            .card-container {
                flex-direction: column;
                align-items: center;
                gap: 40px;
            }
            .glass-card {
                width: 300px; /* Adjusted for smaller size */
                height: 300px; /* Adjusted for smaller size */
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 2.2em;
            }
            .glass-card {
                width: 70vw; /* Adjusted for smaller size */
                height: 70vw; /* Adjusted for smaller size */
                padding: 25px;
            }
            .card-image {
                width: 100px;
                height: 100px;
                margin-bottom: 15px;
            }
            .card-title {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <a href="#" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            <span>Emergency</span>
        </a>
        <a href="tel:9839567899" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.02.74-.25 1.02l-2.2 2.2z"/></svg>
            <span>Contact</span>
        </a>
        <a href="connected pages(index).html" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home Page</span>
        </a>
        <a href="#" class="nav-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            <span>About Us</span>
        </a>
    </header>

    <div class="bg-image"></div>
    <div class="overlay"></div>



    <div class="main-container">
        <h1 class="main-title">Welcome to Our Hospital !</h1>
        <div class="card-container">
            <a href="staff_login.html" class="card-link">
                <div class="glass-card">
                    <img src="images/vector-medical-staff-group-confident-260nw-1870005286.webp" alt="Staff Login" class="card-image">
                    <h2 class="card-title">Staff Login</h2>
                </div>
            </a>
            <a href="patient_booking.html" class="card-link">
                <div class="glass-card">
                    <img src="images/patient image .jpg" alt="Patient Appointment Booking" class="card-image">
                    <h2 class="card-title">Book an Appointment</h2>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
