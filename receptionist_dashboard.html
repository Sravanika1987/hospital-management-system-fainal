<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="receptionist_dashboard.css">
</head>
<body>

    <header class="top-header">
        <a href="connected pages(index).html" class="dashboard-link">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="#" class="dashboard-link">
            <i class="fas fa-phone"></i>
            <span>Help</span>
        </a>
    </header>

    <div class="bg-image"></div>
    <div class="overlay"></div>

    <h1 class="glowing-heading top-heading">Welcome Receptionist!</h1>

    <div class="main-container">
        <div class="dashboard-options">
            <div class="glass-card">
                <a href="#" class="card-link-content">
                    <img src="file:///C:/Users/SRAVANIKA/Downloads/c1.jpg" alt="Add Patient" class="card-image">
                    <span class="card-option-text">Add Patient</span>
                </a>
            </div>
            <div class="glass-card">
                <a href="#" class="card-link-content">
                    <img src="file:///C:/Users/SRAVANIKA/Downloads/d1.jpg" alt="View Available Doctors" class="card-image">
                    <span class="card-option-text">View Available Doctors</span>
                </a>
            </div>
            <div class="glass-card">
                <a href="#" class="card-link-content">
                    <img src="file:///C:/Users/SRAVANIKA/Downloads/pp1.jpg" alt="View Patients" class="card-image">
                    <span class="card-option-text">View Patients</span>
                </a>
            </div>
            <div class="glass-card">
                <a href="#" class="card-link-content">
                    <img src="file:///C:/Users/SRAVANIKA/Downloads/log1.jpg" alt="Logout" class="card-image">
                    <span class="card-option-text logout">Logout</span>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
