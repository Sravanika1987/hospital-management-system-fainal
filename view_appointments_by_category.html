<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments by Category</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="view_appointments_by_category.css">
</head>
<body>

    <header class="top-header">
        <a href="connected pages(index).html" class="dashboard-link">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="enter_category_for_appointments.html" class="dashboard-link">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Category Input</span>
        </a>
        <a href="#" class="dashboard-link">
            <i class="fas fa-phone"></i>
            <span>Help</span>
        </a>
    </header>

    <div class="bg-image"></div>
    <div class="overlay"></div>

    <h1 id="page-heading" class="glowing-heading top-heading">Appointments for Category: <span id="category-display"></span></h1>

    <div class="glass-table-container">
        <div class="glass-table">
            <p id="no-patients-message" style="display: none;">No appointments found for this category!</p>
            <table id="patients-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Contact</th>
                        <th>Gender</th>
                        <th>Address</th>
                        <th>Booking Date</th>
                        <th>Problem</th>
                        <th>Visited Before</th>
                        <th>Category</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Patient rows will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const noPatientsMessage = document.getElementById('no-patients-message');
            const patientsTable = document.getElementById('patients-table');
            const tableBody = patientsTable.querySelector('tbody');
            const categoryDisplay = document.getElementById('category-display');

            // Get category from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const requestedCategory = urlParams.get('category');

            if (requestedCategory) {
                categoryDisplay.textContent = decodeURIComponent(requestedCategory);
            } else {
                categoryDisplay.textContent = 'N/A';
                noPatientsMessage.textContent = 'No category specified.';
                noPatientsMessage.style.display = 'block';
                patientsTable.style.display = 'none';
                return; // Exit if no category is provided
            }

            function renderAppointments() {
                let allPatients = JSON.parse(localStorage.getItem('patients')) || [];
                // Filter patients by the requested category
                let filteredPatients = allPatients.filter(patient => 
                    patient.category && patient.category.toLowerCase() === requestedCategory.toLowerCase()
                );

                tableBody.innerHTML = ''; // Clear existing rows

                if (filteredPatients.length === 0) {
                    noPatientsMessage.style.display = 'block';
                    patientsTable.style.display = 'none';
                } else {
                    noPatientsMessage.style.display = 'none';
                    patientsTable.style.display = 'table';
                    filteredPatients.forEach(patient => {
                        const row = tableBody.insertRow();
                        row.insertCell().textContent = patient.id;
                        row.insertCell().textContent = patient.name;
                        row.insertCell().textContent = patient.age;
                        row.insertCell().textContent = patient.phone;
                        row.insertCell().textContent = patient.gender;
                        row.insertCell().textContent = patient.address;
                        row.insertCell().textContent = patient.date;
                        row.insertCell().textContent = patient.problem;
                        row.insertCell().textContent = patient.visited;
                        row.insertCell().textContent = patient.category || 'N/A';
                    });
                }
            }

            renderAppointments();
        });
    </script>
</body>
</html>
