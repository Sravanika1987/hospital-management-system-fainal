<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin_dashboard.css">
</head>
<body>

    <header class="top-header">
        <a href="connected pages(index).html" class="dashboard-link">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="#" class="dashboard-link">
            <i class="fas fa-phone"></i>
            <span>Help</span>
        </a>
        <a href="view_doctors.html" class="dashboard-link">
            <i class="fas fa-user-md"></i>
            <span>View Doctors</span>
        </a>
        <a href="view_staff.html" class="dashboard-link" style="margin-left: auto;">
            <i class="fas fa-users"></i>
            <span>View Staff</span>
        </a>
        <a href="#" class="dashboard-link">
            <i class="fas fa-sync-alt"></i>
            <span>Reset</span>
        </a>
    </header>

    <div class="bg-image"></div>
    <div class="overlay"></div>

    <h1 class="glowing-heading top-heading">Welcome Admin!</h1>

    <div class="main-container">
        <div class="dashboard-options">
            <div class="glass-card">
                <a href="add_doctor.html" class="card-link-content">
                    <img src="images/d1.jpg" alt="Add Doctors" class="card-image">
                    <span class="card-option-text">Add Doctors</span>
                </a>
            </div>
            <div class="glass-card">
                <a href="add_staff.html" class="card-link-content">
                    <img src="images/st1.jpg" alt="Add Staff" class="card-image">
                    <span class="card-option-text">Add Staff</span>
                </a>
            </div>
            <div class="glass-card">
                <a href="view_workloads.html" class="card-link-content">
                    <img src="images/p2.webp" alt="View Workloads" class="card-image">
                    <span class="card-option-text">View Workloads</span>
                </a>
            </div>
            <div class="glass-card">
                <a href="view_patients_admin.html" class="card-link-content">
                    <img src="images/patient 3.jpeg" alt="View Patients" class="card-image">
                    <span class="card-option-text">View Patients</span>
                </a>
            </div>
            <div class="glass-card">
                <a href="#" class="card-link-content">
                    <img src="images/log1.jpg" alt="Logout" class="card-image">
                    <span class="card-option-text logout">Logout</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check login status
            const isAdminLoggedIn = localStorage.getItem('isAdminLoggedIn');
            if (isAdminLoggedIn !== 'true') {
                window.location.href = 'admin_login.html';
                return;
            }

            // Logout functionality
            const logoutCard = document.querySelector('.glass-card a[href="#"][alt="Logout"]'); // Select the logout link
            if (logoutCard) {
                logoutCard.addEventListener('click', function(event) {
                    event.preventDefault();
                    localStorage.removeItem('isAdminLoggedIn'); // Clear login flag
                    window.location.href = 'admin_login.html'; // Redirect to login page
                });
            }
        });
    </script>

</body>
</html>
